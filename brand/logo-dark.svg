<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1440" role="img" aria-label="A1 Creative Agency — dark presentation">
  <title>A1 Creative Agency — Dark Luxury Presentation</title>

  <defs>
    <radialGradient id="a1d-stage" cx="50%" cy="46%" r="70%">
      <stop offset="0%" stop-color="#0e1422"/>
      <stop offset="55%" stop-color="#05080f"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="a1d-blueHalo" cx="30%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#2a82ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#2a82ff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a1d-goldHalo" cx="72%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#dfb346" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#dfb346" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="a1d-glass" cx="50%" cy="42%" r="62%">
      <stop offset="0%" stop-color="#1d2840"/>
      <stop offset="55%" stop-color="#0b1322"/>
      <stop offset="100%" stop-color="#04070d"/>
    </radialGradient>
    <linearGradient id="a1d-rim" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3f6fb"/>
      <stop offset="22%" stop-color="#8d97ac"/>
      <stop offset="50%" stop-color="#e2e7ef"/>
      <stop offset="78%" stop-color="#5c6478"/>
      <stop offset="100%" stop-color="#c5cbd8"/>
    </linearGradient>
    <linearGradient id="a1d-chrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6f8fc"/>
      <stop offset="14%" stop-color="#a8b0c2"/>
      <stop offset="32%" stop-color="#e7ecf3"/>
      <stop offset="54%" stop-color="#7d8597"/>
      <stop offset="74%" stop-color="#dfe4ee"/>
      <stop offset="100%" stop-color="#525a6c"/>
    </linearGradient>
    <linearGradient id="a1d-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9cc6ff"/>
      <stop offset="50%" stop-color="#2a82ff"/>
      <stop offset="100%" stop-color="#0b3f9d"/>
    </linearGradient>
    <linearGradient id="a1d-gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffe7a8"/>
      <stop offset="50%" stop-color="#dfb346"/>
      <stop offset="100%" stop-color="#876514"/>
    </linearGradient>
    <linearGradient id="a1d-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b4253"/>
      <stop offset="30%" stop-color="#181b24"/>
      <stop offset="60%" stop-color="#2a2f3c"/>
      <stop offset="100%" stop-color="#070912"/>
    </linearGradient>
    <linearGradient id="a1d-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a6275"/>
      <stop offset="50%" stop-color="#cdd3df"/>
      <stop offset="100%" stop-color="#1a1d26"/>
    </linearGradient>
    <linearGradient id="a1d-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1e28"/>
      <stop offset="50%" stop-color="#2a2f3c"/>
      <stop offset="100%" stop-color="#0a0c12"/>
    </linearGradient>
    <linearGradient id="a1d-blueTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2a82ff" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#2a82ff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="a1d-goldTint" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#dfb346" stop-opacity="0"/>
      <stop offset="100%" stop-color="#dfb346" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="a1d-glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="a1d-spark" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
    <filter id="a1d-drop" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.55"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="a1d-bulbClip">
      <path d="M 422 700 C 250 680, 180 530, 180 400 C 180 230, 300 80, 512 80 C 724 80, 844 230, 844 400 C 844 530, 774 680, 602 700 Z"/>
    </clipPath>
