        <path d="M 250 250 L 312 250 L 312 312"/>
        <path d="M 224 420 L 290 420 L 290 484"/>
        <path d="M 268 596 L 332 596"/>
        <path d="M 230 168 L 268 168"/>
        <path d="M 354 642 L 354 678"/>
