  <rect width="1280" height="1440" fill="url(#a1d-stage)"/>
  <rect width="1280" height="1440" fill="url(#a1d-blueHalo)"/>
  <rect width="1280" height="1440" fill="url(#a1d-goldHalo)"/>

  <line x1="160" y1="1320" x2="1120" y2="1320" stroke="#1a1d26" stroke-width="1"/>
