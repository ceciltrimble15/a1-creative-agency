    <g>
      <path d="M 410 698 L 614 698 L 624 730 L 400 730 Z" fill="url(#a1d-base)" stroke="#0a0c12" stroke-width="1"/>
      <rect x="402" y="734" width="220" height="20" rx="4" fill="url(#a1d-base)" stroke="url(#a1d-ring)" stroke-width="1"/>
      <rect x="402" y="758" width="220" height="20" rx="4" fill="url(#a1d-base)" stroke="url(#a1d-ring)" stroke-width="1"/>
      <rect x="402" y="782" width="220" height="20" rx="4" fill="url(#a1d-base)" stroke="url(#a1d-ring)" stroke-width="1"/>
      <path d="M 410 806 L 614 806 L 596 850 L 428 850 Z" fill="url(#a1d-base)" stroke="#0a0c12" stroke-width="1"/>
      <ellipse cx="512" cy="858" rx="60" ry="14" fill="#050609"/>
    </g>

    <g>
      <rect x="80" y="900" width="864" height="84" rx="10"
            fill="url(#a1d-plate)" stroke="url(#a1d-rim)" stroke-width="1.5"/>
      <circle cx="120" cy="942" r="4" fill="url(#a1d-chrome)"/>
      <circle cx="904" cy="942" r="4" fill="url(#a1d-chrome)"/>
      <line x1="180" y1="966" x2="510" y2="966" stroke="url(#a1d-blue)" stroke-width="2"/>
      <line x1="514" y1="966" x2="844" y2="966" stroke="url(#a1d-gold)" stroke-width="2"/>
      <circle cx="512" cy="966" r="3" fill="url(#a1d-chrome)"/>
      <text x="512" y="950" text-anchor="middle"
            font-family="'Space Grotesk','Inter','Helvetica Neue',Arial,sans-serif"
            font-weight="600" font-size="36" letter-spacing="14"
            fill="url(#a1d-chrome)">CREATIVE AGENCY</text>
    </g>
  </g>
</svg>
