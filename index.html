<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/a1-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A1 Creative builds the business system behind your brand — websites, branding, CRM, lead capture, booking, and automation for local businesses ready to close more customers."
    />
    <meta name="theme-color" content="#060A12" />
    <meta property="og:title" content="A1 Creative — Build The Business System Behind Your Brand" />
    <meta
      property="og:description"
      content="A1 Creative builds websites, branding, lead capture, CRM, booking, follow-up, and automation systems for businesses ready to look professional and close more customers."
    />
    <meta property="og:type" content="website" />
    <title>A1 Creative — Build The Business System Behind Your Brand</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!--
      Netlify Forms detection — this hidden form must exist in the
      built HTML so Netlify registers it during deploy.
      The React form POSTs to "/" with form-name matching this name.
    -->
    <form name="a1-creative-quote" netlify netlify-honeypot="bot-field" hidden>
      <input type="text"  name="business-name" />
      <input type="text"  name="name" />
      <input type="tel"   name="phone" />
      <input type="email" name="email" />
      <select name="service"></select>
      <select name="budget"></select>
      <select name="timeline"></select>
      <textarea name="message"></textarea>
      <input type="text"  name="bot-field" />
    </form>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
